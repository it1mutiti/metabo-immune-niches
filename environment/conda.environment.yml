name: metabo-immune-niches
channels:
  - conda-forge
  - nodefaults
channel_priority: strict

dependencies:
  - python=3.10
  - numpy=1.23.*
  - scipy=1.10.*
  - pandas=1.5.*
  - matplotlib=3.6.*
  - seaborn=0.12.*
  - scikit-learn=1.2.*
  - statsmodels=0.13.*
  - h5py
  - jupyterlab
  - git
  - git-lfs
  - pip

  - pip:
      - anndata==0.8.0
      - scanpy==1.9.1
      - squidpy==1.1.2
      - scvi-tools==1.0.3
      - tangram-sc==1.0.3
      - session-info==1.0.0
      - napari==0.4.17
      - "torch<2.1"
      - "numba<0.59"
